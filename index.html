<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario General - Contaduría</title>
    <link rel="stylesheet" href="index.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
</head>
<body>

<div class="container">

    <div id="pantalla-menu" class="pantalla activa">
        <div class="header-title">
            <h2>Sistema de Inventario General</h2>
            <h3>Control Multiproducto</h3>
        </div>
        <div class="menu-grid">
            <div class="card-btn" onclick="cambiarPantalla('pantalla-formulario')">
                <div class="card-icon">📝</div>
                <div class="card-title">Registrar Producto</div>
            </div>
            <div class="card-btn" onclick="irAVista()">
                <div class="card-icon">📊</div>
                <div class="card-title">Ver Tabla</div>
            </div>
            <div class="card-btn" onclick="descargarExcel()">
                <div class="card-icon">📥</div>
                <div class="card-title">Descargar Excel</div>
            </div>
            <div class="card-btn" onclick="document.getElementById('inputExcel').click()">
                <div class="card-icon">📂</div>
                <div class="card-title">Cargar Excel</div>
            </div>
            <input type="file" id="inputExcel" accept=".xlsx" style="display:none" onchange="cargarExcel(event)">
        </div>
    </div>

    <div id="pantalla-formulario" class="pantalla">
        <div class="header-title">
            <h2>Registrar Movimiento de Producto</h2>
        </div>
        <div class="form-container">
            <form id="formKardex" onsubmit="guardarRegistro(event)">
                <div class="form-group">
                    <label>Fecha:</label>
                    <input type="date" id="inFecha" required>
                </div>
                <div class="form-group">
                    <label>Concepto (Ubicación):</label>
                    <input type="text" id="inConcepto" placeholder="Ej. Cubiculo num# 15" required>
                </div>
                <div class="form-group">
                    <label>Código:</label>
                    <input type="text" id="inCodigo" placeholder="Ej. SD SU630 240 GB SATA I" required>
                </div>
                <div class="form-group">
                    <label>Producto:</label>
                    <input type="text" id="inProducto" placeholder="Ej. SSD SU630 240 GB SATA III" required>
                </div>
                <div style="display: flex; gap: 15px;">
                    <div class="form-group" style="flex: 1;">
                        <label>Entrada (Unidades):</label>
                        <input type="number" id="inEntrada" min="0" value="0" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Salida (Unidades):</label>
                        <input type="number" id="inSalida" min="0" value="0" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Costo Unitario ($):</label>
                    <input type="number" id="inUnitario" step="0.01" min="0" required>
                </div>
                <div class="btn-group">
                    <button type="button" class="btn btn-secondary" onclick="cambiarPantalla('pantalla-menu')">Volver</button>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <div id="pantalla-vista" class="pantalla">
        <div class="btn-group" style="margin-bottom:20px;">
            <button class="btn btn-secondary" onclick="cambiarPantalla('pantalla-menu')">⬅ Volver</button>
            <button class="btn btn-primary" onclick="descargarExcel()">📥 Descargar Excel</button>
        </div>
        <div style="overflow-x:auto;">
            <table id="kardexTable">
                <thead>
                    <tr>
                        <th rowspan="2">Fecha</th>
                        <th rowspan="2">Concepto</th>
                        <th rowspan="2">Código</th>
                        <th rowspan="2">Producto</th>
                        <th colspan="3">Unidades</th>
                        <th colspan="2">Costo</th>
                        <th colspan="3">Valores</th>
                        <th rowspan="2">Acción</th>
                    </tr>
                    <tr>
                        <th>Entrada</th>
                        <th>Salida</th>
                        <th>Existencia</th>
                        <th>Unitario</th>
                        <th>Promedio</th>
                        <th>Debe</th>
                        <th>Haber</th>
                        <th>Saldo</th>
                    </tr>
                </thead>
                <tbody id="kardexBody"></tbody>
            </table>
        </div>
    </div>

</div>

<script>
    let registros = [];
    let idRegistro = 1;

    function formatearFechaEspanol(fechaRaw) {
        if (!fechaRaw) return "";
        const meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
        if (fechaRaw instanceof Date) {
            const anio = fechaRaw.getUTCFullYear();
            const mes  = meses[fechaRaw.getUTCMonth()];
            const dia  = String(fechaRaw.getUTCDate()).padStart(2,'0');
            return `${dia}-${mes}-${anio}`;
        }
        if (typeof fechaRaw === 'string' && fechaRaw.includes('-')) {
            const p = fechaRaw.split('-');
            if (p.length === 3 && p[0].length === 4)
                return `${p[2].padStart(2,'0')}-${meses[parseInt(p[1],10)-1]}-${p[0]}`;
        }
        return fechaRaw.toString();
    }

    function getCellText(cell) {
        if (!cell) return "";
        try {
            let v = cell.value;
            if (v !== null && v !== undefined && typeof v === 'object' && 'result' in v) v = v.result;
            if (v !== null && typeof v === 'object' && Array.isArray(v.richText))
                return v.richText.map(rt => rt.text || "").join("").trim();
            if (v !== null && typeof v === 'object' && typeof v.text === 'string')
                return v.text.trim();
            if (v instanceof Date) return formatearFechaEspanol(v);
            if (v !== null && v !== undefined) return v.toString().trim();
            return cell.text ? cell.text.toString().trim() : "";
        } catch(e) { return ""; }
    }

    function getCellNum(cell) {
        if (!cell) return 0;
        try {
            let v = cell.value;
            if (v !== null && typeof v === 'object' && 'result' in v) v = v.result;
            const n = parseFloat(v);
            return isNaN(n) ? 0 : n;
        } catch(e) { return 0; }
    }

    function getSafeCell(worksheet, fila, col) {
        try {
            return worksheet.getRow(fila).getCell(col);
        } catch(e) { return null; }
    }

    function cambiarPantalla(id) {
        document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('activa'));
        document.getElementById(id).classList.add('activa');
    }

    function irAVista() {
        calcularYRenderizarKardex();
        cambiarPantalla('pantalla-vista');
    }

    function guardarRegistro(e) {
        e.preventDefault();
        registros.push({
            id:       idRegistro++,
            fecha:    formatearFechaEspanol(document.getElementById('inFecha').value),
            concepto: document.getElementById('inConcepto').value,
            codigo:   document.getElementById('inCodigo').value,
            producto: document.getElementById('inProducto').value,
            entrada:  parseFloat(document.getElementById('inEntrada').value) || 0,
            salida:   parseFloat(document.getElementById('inSalida').value)  || 0,
            unitario: parseFloat(document.getElementById('inUnitario').value) || 0
        });
        document.getElementById('formKardex').reset();
        document.getElementById('inEntrada').value = 0;
        document.getElementById('inSalida').value  = 0;
        alert("Movimiento guardado correctamente");
    }

    function eliminarRegistro(index) {
        if (confirm("¿Eliminar este registro?")) {
            registros.splice(index, 1);
            calcularYRenderizarKardex();
        }
    }

    function formatMoney(num) {
        return (num !== undefined && num !== null)
            ? Number(num).toLocaleString('es-MX', { minimumFractionDigits: 2, maximumFractionDigits: 2 })
            : "";
    }

    function calcularYRenderizarKardex() {
        const tbody = document.getElementById('kardexBody');
        tbody.innerHTML = '';
        registros.forEach((reg, index) => {
            const existencia = reg.entrada - reg.salida;
            const debe       = reg.entrada * reg.unitario;
            const haber      = reg.salida  * reg.unitario;
            const saldo      = debe - haber;
            const promedio   = (reg.entrada + reg.salida) > 0
                ? (debe + haber) / (reg.entrada + reg.salida)
                : reg.unitario;

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="white-space:nowrap">${reg.fecha}</td>
                <td style="text-align:left">${reg.concepto}</td>
                <td style="text-align:left">${reg.codigo}</td>
                <td style="text-align:left">${reg.producto}</td>
                <td>${reg.entrada}</td>
                <td>${reg.salida}</td>
                <td><strong>${existencia}</strong></td>
                <td>${formatMoney(reg.unitario)}</td>
                <td>${formatMoney(promedio)}</td>
                <td>${formatMoney(debe)}</td>
                <td>${formatMoney(haber)}</td>
                <td><strong>${formatMoney(saldo)}</strong></td>
                <td><button class="btn-delete" onclick="eliminarRegistro(${index})">🗑️</button></td>
            `;
            tbody.appendChild(tr);
        });
    }

    async function cargarExcel(event) {
        const archivo = event.target.files[0];
        if (!archivo) return;

        const reader = new FileReader();
        reader.onload = async function(e) {
            try {
                const workbook = new ExcelJS.Workbook();
                await workbook.xlsx.load(e.target.result);
                const worksheet = workbook.worksheets[0];
                const totalFilas = worksheet.rowCount;

                registros  = [];
                idRegistro = 1;

                // PASO 1: Escanear las primeras 5 filas buscando TODAS las columnas
                // Buscamos en DOS pasadas porque tu Excel tiene headers en 2 filas:
                // Fila 1: UNIDADES, COSTO, VALORES (grupos)
                // Fila 2: FECHA, CONCEPTO, CODIGO, PRODUCTO, Entrada, Salida, Unitario

                let colMap = null;
                let headerRow = 2;

                // Mapa acumulado para combinar info de fila 1 y fila 2
                let mapAcum = {};

                for (let r = 1; r <= Math.min(5, totalFilas); r++) {
                    let tmpMap = { ...mapAcum };
                    let hits   = 0;

                    for (let c = 1; c <= 20; c++) {
                        try {
                            const cell = getSafeCell(worksheet, r, c);
                            if (!cell) continue;
                            const txt = getCellText(cell)
                                .toUpperCase()
                                .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
                                .replace(/\s+/g," ").trim();

                            if (!txt) continue;

                            if (txt === "FECHA")    { tmpMap.fecha    = c; }
                            if (txt === "CONCEPTO") { tmpMap.concepto = c; }
                            if (txt === "CODIGO")   { tmpMap.codigo   = c; }
                            if (txt === "PRODUCTO") { tmpMap.producto = c; }
                            if (txt === "ENTRADA")  { tmpMap.entrada  = c; }
                            if (txt === "SALIDA")   { tmpMap.salida   = c; }
                            if (txt === "UNITARIO") { tmpMap.unitario = c; }
                        } catch(e) { continue; }
                    }

                    // Acumular lo encontrado hasta ahora
                    mapAcum = tmpMap;

                    // Contar cuántos campos clave tenemos ya
                    const campos = ['fecha','concepto','codigo','producto','entrada','salida','unitario'];
                    hits = campos.filter(k => mapAcum[k]).length;

                    // Si tenemos al menos 5 campos incluyendo los numéricos, esta es la última fila de header
                    if (hits >= 5 && mapAcum.entrada && mapAcum.salida) {
                        colMap    = { ...mapAcum };
                        headerRow = r;
                        break;
                    }
                }

                // Fallback absoluto si no detectó nada
                if (!colMap || !colMap.entrada) {
                    colMap = {
                        fecha: 1, concepto: 2, codigo: 4,
                        producto: 5, entrada: 8, salida: 9, unitario: 11
                    };
                    headerRow = 2;
                }

                console.log("Mapa detectado:", colMap, "| Datos desde fila:", headerRow + 1);

                // PASO 2: Leer datos con loop for (sin eachRow)
                let leidos = 0;
                for (let r = headerRow + 1; r <= totalFilas; r++) {
                    try {
                        const celdaFecha = getSafeCell(worksheet, r, colMap.fecha);
                        let fv = celdaFecha ? celdaFecha.value : null;
                        if (fv && typeof fv === 'object' && 'result' in fv) fv = fv.result;
                        const fechaFinal = (fv instanceof Date)
                            ? formatearFechaEspanol(fv)
                            : getCellText(celdaFecha);

                        const conceptoStr = getCellText(getSafeCell(worksheet, r, colMap.concepto));
                        const codigoStr   = getCellText(getSafeCell(worksheet, r, colMap.codigo));
                        const productoStr = getCellText(getSafeCell(worksheet, r, colMap.producto));
                        const entrada     = getCellNum(getSafeCell(worksheet, r, colMap.entrada));
                        const salida      = getCellNum(getSafeCell(worksheet, r, colMap.salida));
                        const unitario    = getCellNum(getSafeCell(worksheet, r, colMap.unitario));

                        // Saltar filas vacías o que sean solo ceros sin texto
                        if (!fechaFinal && !conceptoStr && !productoStr) continue;

                        registros.push({
                            id: idRegistro++,
                            fecha:    fechaFinal,
                            concepto: conceptoStr,
                            codigo:   codigoStr,
                            producto: productoStr,
                            entrada,
                            salida,
                            unitario
                        });
                        leidos++;

                    } catch(err) {
                        console.warn(`Fila ${r} saltada:`, err.message);
                        continue;
                    }
                }

                calcularYRenderizarKardex();
                cambiarPantalla('pantalla-vista');
                alert(`Excel cargado correctamente (${leidos} movimientos recuperados).`);

            } catch (error) {
                console.error("Error:", error);
                alert("Error: " + error.message);
            }
            event.target.value = '';
        };
        reader.readAsArrayBuffer(archivo);
    }
</script>
</body>
</html>
