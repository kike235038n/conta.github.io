<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Kardex - Costos Promedio</title>
    <link rel="stylesheet" href="index.css">

    <!-- Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>

    <!-- Descargar archivos -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <!-- Código de barras -->
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

    <style>

        body{
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 20px;
        }

        .container{
            max-width: 1300px;
            margin: auto;
        }

        .pantalla{
            display: none;
        }

        .pantalla.activa{
            display: block;
        }

        .header-title{
            text-align: center;
            margin-bottom: 25px;
        }

        .menu-grid{
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
            gap: 20px;
        }

        .card-btn{
            background: white;
            border-radius: 15px;
            padding: 30px;
            cursor: pointer;
            text-align: center;
            transition: .3s;
            box-shadow: 0 2px 10px rgba(0,0,0,.1);
        }

        .card-btn:hover{
            transform: translateY(-5px);
        }

        .card-icon{
            font-size: 40px;
        }

        .card-title{
            margin-top: 10px;
            font-weight: bold;
        }

        .form-container{
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 2px 10px rgba(0,0,0,.1);
        }

        .form-group{
            margin-bottom: 15px;
        }

        .form-group label{
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input,
        .form-group select{
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        .btn-group{
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn{
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            font-weight: bold;
        }

        .btn-primary{
            background: #007bff;
        }

        .btn-secondary{
            background: #6c757d;
        }

        table{
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td{
            border: 1px solid #ccc;
            padding: 8px;
            text-align: center;
        }

        th{
            background: #007bff;
            color: white;
        }

        .btn-delete{
            background: red;
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
        }

        #inventarioFinal{
            margin-top: 20px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 10px rgba(0,0,0,.1);
            font-size: 18px;
        }

        .barcode-container{
            margin: 20px 0;
            text-align: center;
        }

    </style>
</head>

<body>

<div class="container">

    <!-- MENU -->
    <div id="pantalla-menu" class="pantalla activa">

        <div class="header-title">
            <h2>Sistema Kardex</h2>
            <h3>Proyecto de Contabilidad</h3>
        </div>

        <div class="menu-grid">

            <div class="card-btn"
                 onclick="cambiarPantalla('pantalla-formulario')">

                <div class="card-icon">📝</div>

                <div class="card-title">
                    Registrar Movimiento
                </div>
            </div>

            <div class="card-btn"
                 onclick="irAVista()">

                <div class="card-icon">📊</div>

                <div class="card-title">
                    Ver Tabla
                </div>
            </div>

            <div class="card-btn"
                 onclick="descargarExcel()">

                <div class="card-icon">📥</div>

                <div class="card-title">
                    Descargar Excel
                </div>
            </div>

            <div class="card-btn"
                 onclick="document.getElementById('inputExcel').click()">

                <div class="card-icon">📂</div>

                <div class="card-title">
                    Cargar Excel
                </div>
            </div>

            <input type="file"
                   id="inputExcel"
                   accept=".xlsx"
                   style="display:none"
                   onchange="cargarExcel(event)">

        </div>

    </div>

    <!-- FORMULARIO -->
    <div id="pantalla-formulario"
         class="pantalla">

        <div class="header-title">
            <h2>Registrar Movimiento</h2>
        </div>

        <div class="form-container">

            <form id="formKardex"
                  onsubmit="guardarRegistro(event)">

                <div class="form-group">

                    <label>Fecha:</label>

                    <input type="text"
                           id="inFecha"
                           placeholder="Ej. 01-May"
                           required>
                </div>

                <div class="form-group">

                    <label>Concepto:</label>

                    <input type="text"
                           id="inConcepto"
                           placeholder="Ej. Compra"
                           required>
                </div>

                <div class="form-group">

                    <label>Tipo de Movimiento:</label>

                    <select id="inTipo"
                            onchange="toggleCostoUnitario()">

                        <option value="entrada">
                            Entrada
                        </option>

                        <option value="salida">
                            Salida
                        </option>

                    </select>
                </div>

                <div class="form-group">

                    <label>Cantidad:</label>

                    <input type="number"
                           id="inCantidad"
                           min="1"
                           required>
                </div>

                <div class="form-group"
                     id="grupoUnitario">

                    <label>Costo Unitario:</label>

                    <input type="number"
                           id="inUnitario"
                           step="0.01">
                </div>

                <div class="btn-group">

                    <button type="button"
                            class="btn btn-secondary"
                            onclick="cambiarPantalla('pantalla-menu')">

                        Volver
                    </button>

                    <button type="submit"
                            class="btn btn-primary">

                        Guardar
                    </button>

                </div>

            </form>

        </div>

    </div>

    <!-- TABLA -->
    <div id="pantalla-vista"
         class="pantalla">

        <div class="btn-group"
             style="margin-bottom:20px;">

            <button class="btn btn-secondary"
                    onclick="cambiarPantalla('pantalla-menu')">

                ⬅ Volver
            </button>

            <button class="btn btn-primary"
                    onclick="descargarExcel()">

                📥 Descargar Excel
            </button>

        </div>

        <div class="barcode-container">
            <svg id="barcode"></svg>
        </div>

        <div style="overflow-x:auto;">

            <table id="kardexTable">

                <thead>

                <tr>
                    <th>ID</th>
                    <th>Fecha</th>
                    <th>Concepto</th>
                    <th>Entrada</th>
                    <th>Salida</th>
                    <th>Existencia</th>
                    <th>Unitario</th>
                    <th>Promedio</th>
                    <th>Debe</th>
                    <th>Haber</th>
                    <th>Saldo</th>
                    <th>Acción</th>
                </tr>

                </thead>

                <tbody id="kardexBody"></tbody>

            </table>

        </div>

        <div id="inventarioFinal"></div>

    </div>

</div>

<script>

    let registros = [];

    let idRegistro = 1;

    function cambiarPantalla(idPantalla){

        document.querySelectorAll('.pantalla')
            .forEach(p => p.classList.remove('activa'));

        document.getElementById(idPantalla)
            .classList.add('activa');
    }

    function irAVista(){

        calcularYRenderizarKardex();

        cambiarPantalla('pantalla-vista');
    }

    function toggleCostoUnitario(){

        const tipo =
            document.getElementById('inTipo').value;

        const campo =
            document.getElementById('inUnitario');

        if(tipo === 'salida'){

            campo.disabled = true;

            campo.required = false;

            campo.value = '';

        }else{

            campo.disabled = false;

            campo.required = true;
        }
    }

    function guardarRegistro(e){

        e.preventDefault();

        const tipo =
            document.getElementById('inTipo').value;

        const nuevoRegistro = {

            id: idRegistro++,

            fecha:
                document.getElementById('inFecha').value,

            concepto:
                document.getElementById('inConcepto').value,

            entrada:
                tipo === 'entrada'
                ? parseFloat(document.getElementById('inCantidad').value)
                : 0,

            salida:
                tipo === 'salida'
                ? parseFloat(document.getElementById('inCantidad').value)
                : 0,

            unitario:
                tipo === 'entrada'
                ? parseFloat(document.getElementById('inUnitario').value)
                : null
        };

        registros.push(nuevoRegistro);

        document.getElementById('formKardex').reset();

        toggleCostoUnitario();

        alert("Movimiento guardado correctamente");
    }

    function eliminarRegistro(index){

        if(confirm("¿Eliminar este registro?")){

            registros.splice(index,1);

            calcularYRenderizarKardex();
        }
    }

    function formatMoney(num){

        return (num || num === 0)

            ? Number(num).toLocaleString('es-MX', {

                minimumFractionDigits: 2,
                maximumFractionDigits: 2

            })

            : "";
    }

    function calcularYRenderizarKardex(){

        const tbody =
            document.getElementById('kardexBody');

        tbody.innerHTML = '';

        let existencia = 0;
        let saldo = 0;
        let promedio = 0;

        registros.forEach((reg,index)=>{

            let debe = 0;
            let haber = 0;

            if(reg.entrada > 0){

                existencia += reg.entrada;

                debe = reg.entrada * reg.unitario;

                saldo += debe;

                promedio = saldo / existencia;

            }else if(reg.salida > 0){

                existencia -= reg.salida;

                haber = reg.salida * promedio;

                saldo -= haber;
            }

            const tr =
                document.createElement('tr');

            tr.innerHTML = `
                <td>${reg.id}</td>
                <td>${reg.fecha}</td>
                <td>${reg.concepto}</td>
                <td>${reg.entrada || ''}</td>
                <td>${reg.salida || ''}</td>
                <td>${existencia}</td>
                <td>${reg.unitario ? formatMoney(reg.unitario) : ''}</td>
                <td>${formatMoney(promedio)}</td>
                <td>${debe ? formatMoney(debe) : ''}</td>
                <td>${haber ? formatMoney(haber) : ''}</td>
                <td>${formatMoney(saldo)}</td>

                <td>
                    <button class="btn-delete"
                            onclick="eliminarRegistro(${index})">

                        🗑️
                    </button>
                </td>
            `;

            tbody.appendChild(tr);

        });

        document.getElementById('inventarioFinal').innerHTML = `

            <strong>Inventario Final:</strong><br><br>

            ${existencia} unidades<br>

            Promedio:
            $${formatMoney(promedio)}<br>

            Saldo total:
            $${formatMoney(saldo)}
        `;
    }

    async function descargarExcel(){

        if(registros.length === 0){

            alert("No hay datos para exportar");

            return;
        }

        const workbook =
            new ExcelJS.Workbook();

        const worksheet =
            workbook.addWorksheet('Kardex');

        worksheet.addRow([
            'ID',
            'Fecha',
            'Concepto',
            'Entrada',
            'Salida',
            'Existencia',
            'Unitario',
            'Promedio',
            'Debe',
            'Haber',
            'Saldo'
        ]);

        let existencia = 0;
        let saldo = 0;
        let promedio = 0;

        registros.forEach(reg=>{

            let debe = 0;
            let haber = 0;

            if(reg.entrada > 0){

                existencia += reg.entrada;

                debe = reg.entrada * reg.unitario;

                saldo += debe;

                promedio = saldo / existencia;

            }else{

                existencia -= reg.salida;

                haber = reg.salida * promedio;

                saldo -= haber;
            }

            worksheet.addRow([

                reg.id,

                reg.fecha,

                reg.concepto,

                reg.entrada,

                reg.salida,

                existencia,

                reg.unitario,

                promedio,

                debe,

                haber,

                saldo
            ]);
        });

        const buffer =
            await workbook.xlsx.writeBuffer();

        const blob = new Blob(

            [buffer],

            {
                type:
                'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
            }
        );

        saveAs(blob,'Kardex.xlsx');
    }

    async function cargarExcel(event){

        const archivo =
            event.target.files[0];

        if(!archivo){

            return;
        }

        const reader =
            new FileReader();

        reader.onload = async function(e){

            const data =
                e.target.result;

            const workbook =
                new ExcelJS.Workbook();

            await workbook.xlsx.load(data);

            const worksheet =
                workbook.getWorksheet(1);

            registros = [];

            let ultimoID = 0;

            worksheet.eachRow((row,rowNumber)=>{

                if(rowNumber === 1){

                    return;
                }

                const valores =
                    row.values;

                if(!valores[1]){

                    return;
                }

                const registro = {

                    id:
                        parseInt(valores[1]) || 0,

                    fecha:
                        valores[2] || "",

                    concepto:
                        valores[3] || "",

                    entrada:
                        parseFloat(valores[4]) || 0,

                    salida:
                        parseFloat(valores[5]) || 0,

                    unitario:
                        parseFloat(valores[7]) || 0
                };

                registros.push(registro);

                if(registro.id > ultimoID){

                    ultimoID = registro.id;
                }

            });

            idRegistro = ultimoID + 1;

            calcularYRenderizarKardex();

            cambiarPantalla('pantalla-vista');

            alert("Excel cargado correctamente");
        };

        reader.readAsArrayBuffer(archivo);
    }

    function generarCodigoBarras(){

        JsBarcode("#barcode","100000",{

            format:"CODE128",

            lineColor:"#000",

            width:2,

            height:40,

            displayValue:true
        });
    }

    window.onload = ()=>{

        toggleCostoUnitario();

        generarCodigoBarras();
    }

</script>

</body>
</html>
