<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario General - Contaduría</title>
    <link rel="stylesheet" href="index.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
</head>
<body>

<div class="container">

    <div id="pantalla-menu" class="pantalla activa">
        <div class="header-title">
            <h2>Sistema de Inventario General</h2>
            <h3>Control Multiproducto</h3>
        </div>

        <div class="menu-grid">
            <div class="card-btn" onclick="cambiarPantalla('pantalla-formulario')">
                <div class="card-icon">📝</div>
                <div class="card-title">Registrar Producto</div>
            </div>

            <div class="card-btn" onclick="irAVista()">
                <div class="card-icon">📊</div>
                <div class="card-title">Ver Tabla</div>
            </div>

            <div class="card-btn" onclick="descargarExcel()">
                <div class="card-icon">📥</div>
                <div class="card-title">Descargar Excel</div>
            </div>

            <div class="card-btn" onclick="document.getElementById('inputExcel').click()">
                <div class="card-icon">📂</div>
                <div class="card-title">Cargar Excel</div>
            </div>

            <input type="file" id="inputExcel" accept=".xlsx" style="display:none" onchange="cargarExcel(event)">
        </div>
    </div>

    <div id="pantalla-formulario" class="pantalla">
        <div class="header-title">
            <h2>Registrar Movimiento de Producto</h2>
        </div>

        <div class="form-container">
            <form id="formKardex" onsubmit="guardarRegistro(event)">
                <div class="form-group">
                    <label>Fecha:</label>
                    <input type="date" id="inFecha" required>
                </div>

                <div class="form-group">
                    <label>Concepto (Ubicación):</label>
                    <input type="text" id="inConcepto" placeholder="Ej. Cubiculo num# 15" required>
                </div>

                <div class="form-group">
                    <label>Código:</label>
                    <input type="text" id="inCodigo" placeholder="Ej. SD SU630 240 GB SATA I" required>
                </div>

                <div class="form-group">
                    <label>Producto:</label>
                    <input type="text" id="inProducto" placeholder="Ej. SSD SU630 240 GB SATA III" required>
                </div>

                <div style="display: flex; gap: 15px;">
                    <div class="form-group" style="flex: 1;">
                        <label>Entrada (Unidades):</label>
                        <input type="number" id="inEntrada" min="0" value="0" required>
                    </div>

                    <div class="form-group" style="flex: 1;">
                        <label>Salida (Unidades):</label>
                        <input type="number" id="inSalida" min="0" value="0" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Costo Unitario ($):</label>
                    <input type="number" id="inUnitario" step="0.01" min="0" required>
                </div>

                <div class="btn-group">
                    <button type="button" class="btn btn-secondary" onclick="cambiarPantalla('pantalla-menu')">Volver</button>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <div id="pantalla-vista" class="pantalla">
        <div class="btn-group" style="margin-bottom:20px;">
            <button class="btn btn-secondary" onclick="cambiarPantalla('pantalla-menu')">⬅ Volver</button>
            <button class="btn btn-primary" onclick="descargarExcel()">📥 Descargar Excel</button>
        </div>

        <div style="overflow-x:auto;">
            <table id="kardexTable">
                <thead>
                    <tr>
                        <th rowspan="2">Fecha</th>
                        <th rowspan="2">Concepto</th>
                        <th rowspan="2">Código</th>
                        <th rowspan="2">Producto</th>
                        <th colspan="3">Unidades</th>
                        <th colspan="2">Costo</th>
                        <th colspan="3">Valores</th>
                        <th rowspan="2">Acción</th>
                    </tr>
                    <tr>
                        <th>Entrada</th>
                        <th>Salida</th>
                        <th>Existencia</th>
                        <th>Unitario</th>
                        <th>Promedio</th>
                        <th>Debe</th>
                        <th>Haber</th>
                        <th>Saldo</th>
                    </tr>
                </thead>
                <tbody id="kardexBody"></tbody>
            </table>
        </div>
    </div>

</div>

<script>
    let registros = [];
    let idRegistro = 1;

    function formatearFechaEspanol(fechaRaw) {
        if (!fechaRaw) return "";
        const meses = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];
        
        if (typeof fechaRaw === 'string' && fechaRaw.includes('-')) {
            const partes = fechaRaw.split('-');
            if (partes.length === 3 && partes[0].length === 4) {
                const anio = partes[0];
                const mes = meses[parseInt(partes[1], 10) - 1];
                const dia = partes[2].padStart(2, '0');
                return `${dia}-${mes}-${anio}`;
            }
        }
        
        if (fechaRaw instanceof Date) {
            const anio = fechaRaw.getUTCFullYear();
            const mes = meses[fechaRaw.getUTCMonth()];
            const dia = String(fechaRaw.getUTCDate()).padStart(2, '0');
            return `${dia}-${mes}-${anio}`;
        }
        
        return fechaRaw.toString();
    }

    function cambiarPantalla(idPantalla) {
        document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('activa'));
        document.getElementById(idPantalla).classList.add('activa');
    }

    function irAVista() {
        calcularYRenderizarKardex();
        cambiarPantalla('pantalla-vista');
    }

    function guardarRegistro(e) {
        e.preventDefault();
        
        const nuevoRegistro = {
            id: idRegistro++,
            fecha: formatearFechaEspanol(document.getElementById('inFecha').value),
            concepto: document.getElementById('inConcepto').value,
            codigo: document.getElementById('inCodigo').value,
            producto: document.getElementById('inProducto').value,
            entrada: parseFloat(document.getElementById('inEntrada').value) || 0,
            salida: parseFloat(document.getElementById('inSalida').value) || 0,
            unitario: parseFloat(document.getElementById('inUnitario').value) || 0
        };

        registros.push(nuevoRegistro);
        document.getElementById('formKardex').reset();
        document.getElementById('inEntrada').value = 0;
        document.getElementById('inSalida').value = 0;
        alert("Movimiento guardado correctamente");
    }

    function eliminarRegistro(index) {
        if (confirm("¿Eliminar este registro?")) {
            registros.splice(index, 1);
            calcularYRenderizarKardex();
        }
    }

    function formatMoney(num) {
        return (num || num === 0) ? Number(num).toLocaleString('es-MX', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : "";
    }

    function calcularYRenderizarKardex() {
        const tbody = document.getElementById('kardexBody');
        tbody.innerHTML = '';
        
        registros.forEach((reg, index) => {
            let existencia = reg.entrada - reg.salida;
            let debe = reg.entrada * reg.unitario;
            let haber = reg.salida * reg.unitario;
            let saldo = debe - haber;
            let promedio = existencia > 0 ? (saldo / existencia) : reg.unitario;

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="white-space: nowrap;">${reg.fecha}</td>
                <td style="text-align: left;">${reg.concepto}</td>
                <td style="text-align: left;">${reg.codigo}</td>
                <td style="text-align: left;">${reg.producto}</td>
                <td>${reg.entrada}</td>
                <td>${reg.salida}</td>
                <td><strong>${existencia}</strong></td>
                <td>${formatMoney(reg.unitario)}</td>
                <td>${formatMoney(promedio)}</td>
                <td>${formatMoney(debe)}</td>
                <td>${formatMoney(haber)}</td>
                <td><strong>${formatMoney(saldo)}</strong></td>
                <td>
                    <button class="btn-delete" onclick="eliminarRegistro(${index})">🗑️</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    async function descargarExcel() {
        if (registros.length === 0) {
            alert("No hay datos para exportar");
            return;
        }

        const workbook = new ExcelJS.Workbook();
        const worksheet = workbook.addWorksheet('Discos duros');

        const rowEncabezado1 = worksheet.addRow(['', '', '', '', 'UNIDADES', '', '', 'COSTO', '', 'VALORES', '', '']);
        worksheet.mergeCells('E1:G1'); 
        worksheet.mergeCells('H1:I1'); 
        worksheet.mergeCells('J1:L1'); 

        const rowEncabezado2 = worksheet.addRow(['FECHA', 'CONCEPTO', 'CODIGO', 'PRODUCTO', 'Entrada', 'Salida', 'Existencia', 'Unitario', 'Promedio', 'Debe', 'Haber', 'Saldo']);
        worksheet.mergeCells('A1:A2'); 
        worksheet.mergeCells('B1:B2'); 
        worksheet.mergeCells('C1:C2'); 
        worksheet.mergeCells('D1:D2'); 

        [rowEncabezado1, rowEncabezado2].forEach(row => {
            row.eachCell(cell => {
                cell.font = { bold: true, color: { argb: 'FFFFFFFF' } };
                cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF000000' } }; 
                cell.alignment = { horizontal: 'center', vertical: 'middle' };
                cell.border = { top: {style:'thin', color: {argb:'FF00B050'}}, bottom: {style:'thin', color: {argb:'FF00B050'}} };
            });
        });

        registros.forEach(reg => {
            let existencia = reg.entrada - reg.salida;
            let debe = reg.entrada * reg.unitario;
            let haber = reg.salida * reg.unitario;
            let saldo = debe - haber;
            let promedio = existencia > 0 ? (saldo / existencia) : reg.unitario;

            const row = worksheet.addRow([
                reg.fecha, reg.concepto, reg.codigo, reg.producto,
                reg.entrada, reg.salida, existencia, reg.unitario, promedio, debe, haber, saldo
            ]);

            row.eachCell((cell, colNumber) => {
                cell.border = {
                    top: {style:'thin'}, left: {style:'thin'}, 
                    bottom: {style:'thin'}, right: {style:'thin'}
                };
                if(colNumber >= 8) {
                    cell.numFmt = '#,##0.00';
                }
            });
        });

        worksheet.columns.forEach((col, i) => {
            if (i === 1 || i === 2 || i === 3) col.width = 25; 
            else if (i === 0) col.width = 12; 
            else col.width = 10; 
        });

        const buffer = await workbook.xlsx.writeBuffer();
        const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
        saveAs(blob, 'CONTADURIA.xlsx');
    }

    async function cargarExcel(event) {
        const archivo = event.target.files[0];
        if (!archivo) return;

        const reader = new FileReader();
        
        reader.onload = async function(e) {
            try {
                const data = e.target.result;
                const workbook = new ExcelJS.Workbook();
                await workbook.xlsx.load(data);
                
                const worksheet = workbook.worksheets[0]; 
                
                registros = [];
                idRegistro = 1;

                worksheet.eachRow((row, rowNumber) => {
                    if (rowNumber <= 2) return;
                    
                    let valFecha = row.getCell(1).value;
                    let fechaFinal = "";

                    if (valFecha && valFecha.result !== undefined) {
                        valFecha = valFecha.result;
                    }

                    if (valFecha instanceof Date) {
                        fechaFinal = formatearFechaEspanol(valFecha);
                    } else {
                        fechaFinal = formatearFechaEspanol(row.getCell(1).text || "");
                    }

                    const productoTxt = row.getCell(4).text || "";

                    if (fechaFinal.trim() === "" && productoTxt.trim() === "") return;

                    let valEntrada = row.getCell(5).value;
                    if(valEntrada && valEntrada.result !== undefined) valEntrada = valEntrada.result;

                    let valSalida = row.getCell(6).value;
                    if(valSalida && valSalida.result !== undefined) valSalida = valSalida.result;

                    let valUnitario = row.getCell(8).value;
                    if(valUnitario && valUnitario.result !== undefined) valUnitario = valUnitario.result;

                    const registro = {
                        id: idRegistro++,
                        fecha: fechaFinal,
                        concepto: row.getCell(2).text || "",
                        codigo: row.getCell(3).text || "",
                        producto: productoTxt,
                        entrada: parseFloat(valEntrada) || 0,
                        salida: parseFloat(valSalida) || 0,
                        unitario: parseFloat(valUnitario) || 0
                    };

                    registros.push(registro);
                });

                calcularYRenderizarKardex();
                cambiarPantalla('pantalla-vista');
                
                alert("Excel cargado correctamente (" + registros.length + " movimientos recuperados).");

            } catch (error) {
                alert("Hubo un problema al intentar leer el documento. Asegúrate de que no esté corrupto y tenga la estructura de las columnas correcta.");
            }
            
            event.target.value = ''; 
        };

        reader.readAsArrayBuffer(archivo);
    }
</script>
</body>
</html>
